server {
    listen 80;
    server_name localhost;

    # Auth Service — rewrite /api/auth/ -> /api/auth/ (langsung)
    # dan /auth/ -> /api/auth/ (via rewrite)
    location /api/auth/ {
        proxy_pass         http://auth-service:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth/ {
        rewrite ^/auth/(.*)$ /api/auth/$1 break;
        proxy_pass         http://auth-service:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Employee Service — tambah prefix /api
    location ~ ^/(employees|branches|positions)(/|$) {
        rewrite ^/(employees|branches|positions)(/.*)?$ /api/$1$2 break;
        proxy_pass         http://employee-service:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Purchase Service — tambah prefix /api
    location ~ ^/(vendors|items|purchase-orders)(/|$) {
        rewrite ^/(vendors|items|purchase-orders)(/.*)?$ /api/$1$2 break;
        proxy_pass         http://purchase-service:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
